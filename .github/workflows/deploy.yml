name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          test -s ~/.ssh/ec2_deploy_key || { echo "EC2_SSH_KEY is empty or not set in repo secrets."; exit 1; }
          head -n 1 ~/.ssh/ec2_deploy_key | grep -q 'BEGIN' || { echo "EC2_SSH_KEY must be a PEM private key (starts with -----BEGIN)."; exit 1; }

      - name: Deploy via SSH
        env:
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=60 \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            bash -s <<'ENDSSH'
          set -euo pipefail
          cd CodeSM
          git fetch origin
          git reset --hard origin/main
          git clean -fd

          cd backend
          npm install --production

          cd ../workers
          npm install --production

          pm2 reload all
          ENDSSH
