name: Workers CI

on:
  pull_request:
    paths:
      - "workers/**"
      - ".github/workflows/workers-ci.yml"
  push:
    branches:
      - main
    paths:
      - "workers/**"
      - ".github/workflows/workers-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: workers

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (worker entry)
        run: node --check src/worker.js
